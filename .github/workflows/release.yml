name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  native-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: ubuntu
            arch: x86_64
          - os: macos-latest
            os_name: macos
            arch: arm64
          - os: macos-15-intel
            os_name: macos
            arch: x86_64
          - os: windows-latest
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Guard opam dependency filters
        shell: bash
        run: |
          if grep -n "with-native" dune-project alsdiff.opam; then
            echo "::error::Found deprecated with-native filter in package metadata."
            exit 1
          fi

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build native CLI target
        run: opam exec -- dune build bin/alsdiff.exe

      - name: Run tests
        run: opam exec -- dune runtest

  js-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: ubuntu
            arch: x86_64
          - os: macos-latest
            os_name: macos
            arch: arm64
          - os: macos-15-intel
            os_name: macos
            arch: x86_64
          - os: windows-latest
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      # Enable JS-only dependencies filtered by {with_js} in opam metadata.
      OPAMVAR_with_js: "true"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Guard opam dependency filters
        shell: bash
        run: |
          if grep -n "with-native" dune-project alsdiff.opam; then
            echo "::error::Found deprecated with-native filter in package metadata."
            exit 1
          fi

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Run JS regression tests
        run: opam exec -- dune build @runtest-js

  build-and-release:
    needs: [native-test, js-test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: ubuntu
            arch: x86_64
          - os: macos-latest
            os_name: macos
            arch: arm64
          - os: macos-15-intel
            os_name: macos
            arch: x86_64
          - os: windows-latest
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate version format
        shell: bash
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ ! $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

      - name: Extract version
        id: get_version
        shell: bash
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - name: Install dependencies
        run: opam install . --deps-only

      - name: Build native CLI target
        run: opam exec -- dune build bin/alsdiff.exe

      - name: Prepare install tree
        shell: bash
        run: |
          mkdir -p install/bin
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp _build/default/bin/alsdiff.exe install/bin/alsdiff.exe
          else
            cp _build/default/bin/alsdiff.exe install/bin/alsdiff
          fi

      - name: Create zip (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          zip -j alsdiff-${{ matrix.os_name }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}.zip install/bin/alsdiff

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd install/bin
          7z a ../../alsdiff-${{ matrix.os_name }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}.zip alsdiff.exe

      - name: Upload release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            alsdiff-${{ matrix.os_name }}-${{ matrix.arch }}-${{ steps.get_version.outputs.version }}.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
