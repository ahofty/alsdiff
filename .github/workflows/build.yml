name: Build and Test

on:
  - push
  - pull_request

permissions: read-all

jobs:
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: ubuntu
            arch: x86_64
          - os: macos-latest
            os_name: macos
            arch: arm64
          - os: macos-15-intel
            os_name: macos
            arch: x86_64
          - os: windows-latest
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Guard opam dependency filters
        shell: bash
        run: |
          if grep -n "with-native" dune-project alsdiff.opam; then
            echo "::error::Found deprecated with-native filter in package metadata."
            exit 1
          fi

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - run: opam install . --deps-only --with-test

      # Build only the native CLI target; full `dune build` would pull JS targets.
      - run: opam exec -- dune build bin/alsdiff.exe

      - run: opam exec -- dune runtest

  js:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            os_name: ubuntu
            arch: x86_64
          - os: macos-latest
            os_name: macos
            arch: arm64
          - os: macos-15-intel
            os_name: macos
            arch: x86_64
          - os: windows-latest
            os_name: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}
    env:
      # Enable JS-only dependencies filtered by {with_js} in opam metadata.
      OPAMVAR_with_js: "true"

    steps:
      - name: Checkout tree
        uses: actions/checkout@v6

      - name: Guard opam dependency filters
        shell: bash
        run: |
          if grep -n "with-native" dune-project alsdiff.opam; then
            echo "::error::Found deprecated with-native filter in package metadata."
            exit 1
          fi

      - name: Set-up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: 5

      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune build @runtest-js
